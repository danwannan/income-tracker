<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

    <!-- ========== iOS PWA 支持 ========== -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="收入账本">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><rect width='180' height='180' rx='36' fill='%2310b981'/><text x='90' y='118' font-size='100' text-anchor='middle' fill='white'>💰</text></svg>">

    <!-- ========== TailwindCSS CDN ========== -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: { 500: '#10b981', 600: '#059669' }
                    }
                }
            }
        }
    </script>

    <!-- ========== ECharts + Supabase CDN（360国内加速） ========== -->
    <script src="https://registry.npmmirror.com/echarts/5.5.0/files/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <title>收入账本</title>

    <style>
        html, body {
            height: 100%;
            overscroll-behavior: none;
            -webkit-font-smoothing: antialiased;
        }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        ::-webkit-scrollbar { width: 0; height: 0; }

        input:focus, textarea:focus {
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.25);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .toast-enter { animation: slideDown 0.25s ease-out; }

        .chart-container { min-height: 340px; height: 340px; }

        /* 滑动容器隐藏滚动条 */
        #swipe-container::-webkit-scrollbar { display: none; }
        #swipe-container { scrollbar-width: none; -ms-overflow-style: none; }
    </style>
</head>
<body class="bg-white text-gray-900 min-h-screen">

    <!-- ==================== 主容器 ==================== -->
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col safe-top safe-bottom">

        <!-- ========== 头部导航栏 ========== -->
        <header class="px-5 py-4 flex items-center justify-between sticky top-0 bg-white/95 backdrop-blur-md z-20 border-b border-gray-100">
            <div class="flex items-center gap-2.5">
                <span class="text-2xl">💰</span>
                <h1 class="text-lg font-bold tracking-wide text-gray-900">收入账本</h1>
            </div>
            <div id="header-actions" class="hidden items-center gap-2">
                <span id="header-email" class="text-xs text-gray-400 max-w-[120px] truncate hidden sm:inline"></span>
                <button id="btn-logout" class="text-xs px-3 py-1.5 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-600 transition-colors min-h-[36px]">
                    退出
                </button>
            </div>
        </header>

        <!-- ========== 认证页面 ========== -->
        <section id="auth-section" class="flex-1 flex flex-col justify-center px-5 py-8">
            <div class="bg-white rounded-2xl p-6 border border-gray-200 shadow-sm">
                <div class="flex mb-6 bg-gray-100 rounded-lg p-1">
                    <button id="tab-login" class="flex-1 py-2.5 text-sm font-medium rounded-md transition-all bg-emerald-500 text-white min-h-[44px]">登录</button>
                    <button id="tab-register" class="flex-1 py-2.5 text-sm font-medium rounded-md transition-all text-gray-500 hover:text-gray-700 min-h-[44px]">注册</button>
                </div>

                <form id="form-login" class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1.5 ml-1">邮箱地址</label>
                        <input type="email" id="login-email" placeholder="your@email.com"
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-900 placeholder-gray-400 outline-none transition-all min-h-[44px]">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1.5 ml-1">密码</label>
                        <input type="password" id="login-password" placeholder="••••••••"
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-900 placeholder-gray-400 outline-none transition-all min-h-[44px]">
                    </div>
                    <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-3 rounded-lg transition-colors text-sm min-h-[44px]">登 录</button>
                </form>

                <form id="form-register" class="space-y-4 hidden">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1.5 ml-1">邮箱地址</label>
                        <input type="email" id="register-email" placeholder="your@email.com"
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-900 placeholder-gray-400 outline-none transition-all min-h-[44px]">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1.5 ml-1">密码（至少 6 位）</label>
                        <input type="password" id="register-password" placeholder="••••••••"
                               class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-900 placeholder-gray-400 outline-none transition-all min-h-[44px]">
                    </div>
                    <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-3 rounded-lg transition-colors text-sm min-h-[44px]">注 册</button>
                </form>
                <p class="text-xs text-gray-400 text-center mt-5">数据安全存储于 Supabase，仅你自己可见</p>
            </div>
        </section>

        <!-- ========== 主功能区 ========== -->
        <main id="main-section" class="hidden flex-1 flex flex-col">

            <!-- 页面切换 Tab -->
            <div class="flex items-center justify-center gap-6 py-3 px-4">
                <button id="tab-page1" class="text-sm font-medium min-h-[36px] px-1 transition-colors text-emerald-500 border-b-2 border-emerald-500">记 录</button>
                <button id="tab-page2" class="text-sm font-medium min-h-[36px] px-1 transition-colors text-gray-300 border-b-2 border-transparent">统 计</button>
            </div>

            <!-- 滑动页面容器 -->
            <div id="swipe-container" class="flex-1 overflow-x-auto snap-x snap-mandatory scroll-smooth flex" style="scrollbar-width: none; -ms-overflow-style: none;">

                <!-- ===== 第一页：收入录入 + 历史列表 ===== -->
                <div id="page-record" class="snap-start flex-shrink-0 w-full flex flex-col px-4 pb-6 space-y-4 overflow-y-auto" style="scrollbar-width: none;">

                    <!-- 录入表单 -->
                    <div class="bg-white rounded-2xl p-5 border border-gray-200 shadow-sm">
                        <p class="text-sm font-medium text-gray-700 mb-3" id="form-title">记录收入</p>
                        <form id="form-income" class="space-y-3">
                            <input type="hidden" id="edit-id" value="">
                            <div>
                                <label class="block text-xs text-gray-400 mb-1 ml-1">金额 <span class="text-red-400">*</span></label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">¥</span>
                                    <input type="text" inputmode="decimal" id="income-amount" placeholder="0.00"
                                           class="w-full bg-gray-50 border border-gray-200 rounded-lg pl-9 pr-4 py-3 text-sm text-gray-900 placeholder-gray-400 outline-none transition-all min-h-[44px]">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-400 mb-1 ml-1">来源</label>
                                <input type="text" id="income-source" placeholder="如：项目A结款、咨询费"
                                       class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-900 placeholder-gray-400 outline-none transition-all min-h-[44px]">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-400 mb-1 ml-1">备注</label>
                                <input type="text" id="income-remark" placeholder="可选备注"
                                       class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-900 placeholder-gray-400 outline-none transition-all min-h-[44px]">
                            </div>
                            <div class="flex gap-2">
                                <button type="submit" id="btn-submit"
                                        class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-3 rounded-lg transition-colors text-sm min-h-[44px] flex items-center justify-center gap-1.5">
                                    <span>✓</span> 记一笔
                                </button>
                                <button type="button" id="btn-cancel-edit"
                                        class="hidden px-4 py-3 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm transition-colors min-h-[44px]">
                                    取消
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- 历史记录列表 -->
                    <div class="bg-white rounded-2xl p-5 border border-gray-200 shadow-sm flex-1">
                        <div class="flex items-center justify-between mb-3">
                            <p class="text-sm font-medium text-gray-700">历史记录</p>
                            <span id="list-filter-count" class="text-[10px] text-gray-400 hidden"></span>
                        </div>
                        <!-- 搜索栏 -->
                        <div class="relative mb-3">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-300 text-sm">🔍</span>
                            <input type="text" id="search-input" placeholder="搜索来源或备注..."
                                   class="w-full bg-gray-50 border border-gray-200 rounded-lg pl-9 pr-8 py-2.5 text-sm text-gray-900 placeholder-gray-400 outline-none transition-all min-h-[40px] focus:border-emerald-300">
                            <button id="btn-clear-search" class="hidden absolute right-2 top-1/2 -translate-y-1/2 w-6 h-6 flex items-center justify-center rounded-full text-gray-300 hover:text-gray-500 hover:bg-gray-200 transition-colors text-xs">✕</button>
                        </div>
                        <div id="list-loading" class="flex justify-center py-6">
                            <div class="w-5 h-5 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                        </div>
                        <div id="list-empty" class="hidden text-center py-8">
                            <p class="text-3xl mb-2">📝</p>
                            <p class="text-sm text-gray-400">还没有收入记录</p>
                        </div>
                        <div id="list-container" class="space-y-2 max-h-[420px] overflow-y-auto pr-1"></div>
                    </div>
                </div>

                <!-- ===== 第二页：统计 + 图表 ===== -->
                <div id="page-stats" class="snap-start flex-shrink-0 w-full flex flex-col px-4 pb-6 space-y-4 overflow-y-auto" style="scrollbar-width: none;">

                    <!-- 年收入统计卡片 -->
                    <div class="bg-white rounded-2xl p-5 border border-gray-200 shadow-sm">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-xs text-gray-400 mb-1">年收入</p>
                                <p id="stat-yearly-income" class="text-3xl font-bold text-gray-900 tracking-tight">¥0.00</p>
                            </div>
                            <div class="w-12 h-12 rounded-full bg-emerald-50 flex items-center justify-center text-2xl">💵</div>
                        </div>
                        <div class="mt-3 flex gap-4 text-xs text-gray-400">
                            <span>总笔数：<strong id="stat-total-count" class="text-gray-700">0</strong></span>
                            <span>总收入：<strong id="stat-total-income" class="text-gray-700">¥0.00</strong></span>
                        </div>
                    </div>

                    <!-- 图表卡片 -->
                    <div class="bg-white rounded-2xl p-4 border border-gray-200 shadow-sm flex-1">
                        <p class="text-xs text-gray-400 mb-2 ml-1">收入构成</p>
                        <div id="chart-pie" class="chart-container w-full"></div>
                        <p id="chart-empty-hint" class="text-xs text-gray-400 text-center mt-2 hidden">暂无数据，添加一笔收入吧 ✨</p>
                    </div>
                </div>
            </div>

            <!-- 页面指示器 -->
            <div class="flex items-center justify-center gap-2 py-2 pb-4">
                <span id="dot1" class="w-1.5 h-1.5 rounded-full bg-emerald-500 transition-all"></span>
                <span id="dot2" class="w-1.5 h-1.5 rounded-full bg-gray-200 transition-all"></span>
            </div>

        </main>

        <!-- ========== 删除确认弹窗 ========== -->
        <div id="modal-delete" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4 bg-black/40 backdrop-blur-sm">
            <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl border border-gray-200">
                <p class="text-base font-medium text-gray-900 mb-2">确认删除</p>
                <p class="text-sm text-gray-500 mb-4">删除后无法恢复，确定要删除这条记录吗？</p>
                <div class="flex gap-3">
                    <button id="btn-confirm-delete" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-medium py-2.5 rounded-lg text-sm transition-colors min-h-[44px]">删除</button>
                    <button id="btn-cancel-delete" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 font-medium py-2.5 rounded-lg text-sm transition-colors min-h-[44px]">取消</button>
                </div>
            </div>
        </div>

        <!-- ========== Toast ========== -->
        <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 hidden">
            <div class="bg-gray-800 text-white text-sm px-5 py-3 rounded-xl shadow-xl border border-gray-700 flex items-center gap-2 toast-enter">
                <span id="toast-icon"></span>
                <span id="toast-msg"></span>
            </div>
        </div>

    </div>

    <!-- ==================== 应用脚本 ==================== -->
    <script>
    (function () {
        'use strict';

        // ============================================================
        // Supabase 配置
        // ============================================================
        const SUPABASE_URL = 'https://dcqognzsoixncofgymox.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_oYz6rOGGa5v808d7pwmlxg_rdUfwBVu';
        const SUPABASE_SERVICE_KEY = ''; // 如需自动确认邮箱，在此填入 service_role key

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================================
        // DOM 引用
        // ============================================================
        const $ = (sel) => document.querySelector(sel);

        const authSection   = $('#auth-section');
        const mainSection   = $('#main-section');
        const headerActions = $('#header-actions');
        const headerEmail   = $('#header-email');
        const tabLogin      = $('#tab-login');
        const tabRegister   = $('#tab-register');
        const formLogin     = $('#form-login');
        const formRegister  = $('#form-register');

        const statYearly    = $('#stat-yearly-income');
        const statTotal     = $('#stat-total-income');
        const statCount     = $('#stat-total-count');
        const formIncome    = $('#form-income');
        const editId        = $('#edit-id');
        const btnSubmit     = $('#btn-submit');
        const btnCancelEdit = $('#btn-cancel-edit');
        const formTitle     = $('#form-title');
        const listContainer = $('#list-container');
        const listLoading   = $('#list-loading');
        const listEmpty     = $('#list-empty');
        const modalDelete   = $('#modal-delete');

        const toast         = $('#toast');
        const toastIcon     = $('#toast-icon');
        const toastMsg      = $('#toast-msg');
        let toastTimer      = null;

        // ---- ECharts ----
        let chartInstance   = null;
        let chartResizeObserver = null;

        // ---- 待删除 ID ----
        let pendingDeleteId = null;

        // ---- 搜索相关 ----
        let allRows = [];           // 存储全部数据用于搜索
        let searchKeyword = '';     // 当前搜索关键词

        // ============================================================
        // 工具函数
        // ============================================================
        function formatMoney(amount) {
            const num = parseFloat(amount);
            if (isNaN(num)) return '¥0.00';
            return '¥' + num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getCurrentYear() {
            return new Date().getFullYear();
        }

        function showToast(message, icon = '✓', duration = 2200) {
            if (toastTimer) clearTimeout(toastTimer);
            toastIcon.textContent = icon;
            toastMsg.textContent = message;
            toast.classList.remove('hidden');
            void toast.offsetWidth;
            toast.firstElementChild.classList.remove('toast-enter');
            void toast.firstElementChild.offsetWidth;
            toast.firstElementChild.classList.add('toast-enter');
            toastTimer = setTimeout(() => {
                toast.classList.add('hidden');
                toastTimer = null;
            }, duration);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ============================================================
        // 认证模块
        // ============================================================
        function switchAuthTab(tab) {
            if (tab === 'login') {
                tabLogin.classList.add('bg-emerald-500', 'text-white'); tabLogin.classList.remove('text-gray-500');
                tabRegister.classList.remove('bg-emerald-500', 'text-white'); tabRegister.classList.add('text-gray-500');
                formLogin.classList.remove('hidden'); formRegister.classList.add('hidden');
            } else {
                tabRegister.classList.add('bg-emerald-500', 'text-white'); tabRegister.classList.remove('text-gray-500');
                tabLogin.classList.remove('bg-emerald-500', 'text-white'); tabLogin.classList.add('text-gray-500');
                formRegister.classList.remove('hidden'); formLogin.classList.add('hidden');
            }
        }

        tabLogin.addEventListener('click',    () => switchAuthTab('login'));
        tabRegister.addEventListener('click', () => switchAuthTab('register'));

        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = $('#login-email').value.trim();
            const password = $('#login-password').value;
            if (!email || !password) { showToast('请填写邮箱和密码', '⚠️'); return; }
            const btn = formLogin.querySelector('button[type="submit"]');
            btn.disabled = true; btn.textContent = '登录中...';
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            btn.disabled = false; btn.textContent = '登 录';
            if (error) {
                if (error.message.includes('Invalid login credentials')) showToast('邮箱或密码错误', '❌');
                else if (error.message.includes('Email not confirmed')) showToast('邮箱未验证', '❌');
                else showToast('登录失败：' + error.message, '❌');
            } else {
                showToast('登录成功', '✅');
            }
        });

        formRegister.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = $('#register-email').value.trim();
            const password = $('#register-password').value;
            if (!email || !password) { showToast('请填写邮箱和密码', '⚠️'); return; }
            if (password.length < 6) { showToast('密码至少 6 位', '⚠️'); return; }
            const btn = formRegister.querySelector('button[type="submit"]');
            btn.disabled = true; btn.textContent = '注册中...';
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) { btn.disabled = false; btn.textContent = '注 册'; showToast(error.message || '注册失败', '❌'); return; }
            if (data?.user?.identities?.length === 0) { btn.disabled = false; btn.textContent = '注 册'; showToast('该邮箱已注册，请直接登录', '📧'); return; }
            // 自动确认邮箱
            if (SUPABASE_SERVICE_KEY) {
                try {
                    await fetch(SUPABASE_URL + '/auth/v1/admin/users/' + data.user.id, {
                        method: 'PUT',
                        headers: { 'Authorization': 'Bearer ' + SUPABASE_SERVICE_KEY, 'apikey': SUPABASE_SERVICE_KEY, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email_confirm: true })
                    });
                } catch (_) {}
            }
            const { error: loginError } = await supabase.auth.signInWithPassword({ email, password });
            btn.disabled = false; btn.textContent = '注 册';
            if (loginError) showToast('注册成功，请手动登录', '⚠️');
            else showToast('注册成功，已自动登录！', '✅');
        });

        $('#btn-logout').addEventListener('click', async () => {
            await supabase.auth.signOut();
            showToast('已退出登录', '👋');
        });

        // ============================================================
        // 认证状态监听
        // ============================================================
        supabase.auth.onAuthStateChange((event, session) => {
            if (session?.user) {
                authSection.classList.add('hidden');
                mainSection.classList.remove('hidden');
                headerActions.classList.remove('hidden');
                headerEmail.textContent = session.user.email;
                loadAllData();
            } else {
                authSection.classList.remove('hidden');
                mainSection.classList.add('hidden');
                headerActions.classList.add('hidden');
                headerEmail.textContent = '';
            }
        });

        // ============================================================
        // 数据加载
        // ============================================================
        async function loadAllData() {
            await Promise.all([fetchStatsAndList(), fetchChartData()]);
        }

        async function fetchStatsAndList() {
            listLoading.classList.remove('hidden');
            listContainer.innerHTML = '';

            const { data: rows, error } = await supabase
                .from('incomes')
                .select('*')
                .order('created_at', { ascending: false });

            listLoading.classList.add('hidden');

            if (error) {
                showToast('加载失败：' + error.message, '❌');
                return;
            }

            // 计算统计数据
            const currentYear = getCurrentYear();
            let yearlySum = 0, totalSum = 0;
            (rows || []).forEach(row => {
                const amount = parseFloat(row.amount) || 0;
                totalSum += amount;
                const rowYear = row.created_at ? new Date(row.created_at).getFullYear() : 0;
                if (rowYear === currentYear) yearlySum += amount;
            });

            statYearly.textContent = formatMoney(yearlySum);
            statTotal.textContent   = formatMoney(totalSum);
            statCount.textContent   = (rows || []).length;

            // 存储全部数据，应用搜索过滤
            allRows = rows || [];
            applySearchFilter();
        }

        /** 模糊搜索过滤并重新渲染列表 */
        function applySearchFilter() {
            const keyword = searchKeyword.trim().toLowerCase();
            let filtered = allRows;

            if (keyword) {
                filtered = allRows.filter(row => {
                    const source = (row.source || '').toLowerCase();
                    const remark = (row.remark || '').toLowerCase();
                    return source.includes(keyword) || remark.includes(keyword);
                });
                $('#list-filter-count').classList.remove('hidden');
                $('#list-filter-count').textContent = `找到 ${filtered.length} 条`;
            } else {
                $('#list-filter-count').classList.add('hidden');
            }

            renderList(filtered);
        }

        function renderList(rows) {
            listContainer.innerHTML = '';
            if (rows.length === 0) { listEmpty.classList.remove('hidden'); return; }
            listEmpty.classList.add('hidden');

            rows.forEach((row, index) => {
                const card = document.createElement('div');
                card.className = 'bg-gray-50 rounded-xl px-4 py-3 border border-gray-100 animate-fade-in-up flex items-center justify-between';
                card.style.animationDelay = (index * 30) + 'ms';

                const amount = parseFloat(row.amount) || 0;
                const timeStr = row.created_at
                    ? new Date(row.created_at).toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' })
                    : '';

                card.innerHTML = `
                    <div class="flex-1 min-w-0 mr-2">
                        <p class="text-sm text-gray-800 font-medium truncate">${escapeHtml(row.source || '未命名来源')}</p>
                        <p class="text-[11px] text-gray-400 mt-0.5">${timeStr}${row.remark ? ' · ' + escapeHtml(row.remark) : ''}</p>
                    </div>
                    <div class="flex items-center gap-3 flex-shrink-0">
                        <span class="text-sm font-semibold text-emerald-600">${formatMoney(amount)}</span>
                        <button class="btn-edit w-7 h-7 flex items-center justify-center rounded-lg text-gray-300 hover:text-emerald-500 hover:bg-emerald-50 transition-colors" data-id="${row.id}" data-amount="${row.amount}" data-source="${escapeHtml(row.source || '')}" data-remark="${escapeHtml(row.remark || '')}" title="修改">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="btn-del w-7 h-7 flex items-center justify-center rounded-lg text-gray-300 hover:text-red-500 hover:bg-red-50 transition-colors" data-id="${row.id}" title="删除">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                `;
                listContainer.appendChild(card);
            });

            // 绑定编辑按钮事件
            listContainer.querySelectorAll('.btn-edit').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    const amount = btn.dataset.amount;
                    const source = btn.dataset.source;
                    const remark = btn.dataset.remark;
                    startEdit(id, amount, source, remark);
                });
            });

            // 绑定删除按钮事件
            listContainer.querySelectorAll('.btn-del').forEach(btn => {
                btn.addEventListener('click', () => {
                    pendingDeleteId = btn.dataset.id;
                    modalDelete.classList.remove('hidden');
                });
            });
        }

        // ============================================================
        // 修改 / 删除功能
        // ============================================================
        function startEdit(id, amount, source, remark) {
            editId.value = id;
            $('#income-amount').value = amount;
            $('#income-source').value = source;
            $('#income-remark').value = remark;
            btnSubmit.innerHTML = '<span>✓</span> 保存修改';
            btnSubmit.classList.remove('bg-emerald-500', 'hover:bg-emerald-600');
            btnSubmit.classList.add('bg-amber-500', 'hover:bg-amber-600');
            btnCancelEdit.classList.remove('hidden');
            formTitle.textContent = '修改记录';
            $('#income-amount').focus();
            // 滚动到表单
            formIncome.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function cancelEdit() {
            editId.value = '';
            $('#income-amount').value = '';
            $('#income-source').value = '';
            $('#income-remark').value = '';
            btnSubmit.innerHTML = '<span>✓</span> 记一笔';
            btnSubmit.classList.remove('bg-amber-500', 'hover:bg-amber-600');
            btnSubmit.classList.add('bg-emerald-500', 'hover:bg-emerald-600');
            btnCancelEdit.classList.add('hidden');
            formTitle.textContent = '记录收入';
        }

        btnCancelEdit.addEventListener('click', cancelEdit);

        // 删除确认弹窗
        $('#btn-cancel-delete').addEventListener('click', () => {
            modalDelete.classList.add('hidden');
            pendingDeleteId = null;
        });

        $('#btn-confirm-delete').addEventListener('click', async () => {
            if (!pendingDeleteId) return;
            modalDelete.classList.add('hidden');
            const { error } = await supabase.from('incomes').delete().eq('id', pendingDeleteId);
            if (error) {
                showToast('删除失败：' + error.message, '❌');
            } else {
                showToast('已删除', '🗑️');
                loadAllData();
            }
            pendingDeleteId = null;
        });

        // 点击遮罩关闭弹窗
        modalDelete.addEventListener('click', (e) => {
            if (e.target === modalDelete) {
                modalDelete.classList.add('hidden');
                pendingDeleteId = null;
            }
        });

        // ============================================================
        // 图表
        // ============================================================
        async function fetchChartData() {
            const { data: rows, error } = await supabase.from('incomes').select('amount, source');
            if (error) return;
            const sourceMap = {};
            (rows || []).forEach(row => {
                const key = row.source || '未分类';
                sourceMap[key] = (sourceMap[key] || 0) + (parseFloat(row.amount) || 0);
            });
            const entries = Object.entries(sourceMap).sort((a, b) => b[1] - a[1]);
            renderChart(entries.map(e => e[0]), entries.map(e => e[1]));
        }

        function renderChart(names, values) {
            const chartDom = $('#chart-pie');
            const emptyHint = $('#chart-empty-hint');
            const total = values.reduce((a, b) => a + b, 0);

            if (names.length === 0 || total === 0) {
                chartDom.style.display = 'none';
                emptyHint.classList.remove('hidden');
                if (chartInstance) { chartInstance.dispose(); chartInstance = null; }
                return;
            }
            chartDom.style.display = '';
            emptyHint.classList.add('hidden');
            if (chartInstance) { chartInstance.dispose(); chartInstance = null; }

            chartInstance = echarts.init(chartDom, null, { devicePixelRatio: window.devicePixelRatio || 1 });

            // 高级配色：柔和新绿系
            const palette = [
                '#059669', '#10b981', '#34d399', '#6ee7b7',
                '#f59e0b', '#f97316', '#ef4444', '#8b5cf6',
                '#3b82f6', '#06b6d4', '#84cc16', '#ec4899'
            ];

            const option = {
                color: palette,
                title: {
                    text: formatMoney(total),
                    subtext: '总收入',
                    left: 'center',
                    top: '42%',
                    textStyle: { fontSize: 18, fontWeight: 'bold', color: '#1f2937' },
                    subtextStyle: { fontSize: 11, color: '#9ca3af' }
                },
                tooltip: {
                    trigger: 'item',
                    backgroundColor: '#fff',
                    borderColor: '#e5e7eb',
                    borderWidth: 1,
                    padding: [10, 14],
                    textStyle: { color: '#1f2937', fontSize: 12 },
                    formatter: function (p) {
                        return `<strong>${p.name}</strong><br/>金额：${formatMoney(p.value)}<br/>占比：${p.percent}%`;
                    }
                },
                legend: {
                    orient: 'horizontal',
                    bottom: 0,
                    left: 'center',
                    textStyle: { color: '#6b7280', fontSize: 10 },
                    itemWidth: 7,
                    itemHeight: 7,
                    itemGap: 10,
                    icon: 'roundRect'
                },
                series: [{
                    name: '收入构成',
                    type: 'pie',
                    radius: ['55%', '82%'],
                    center: ['50%', '48%'],
                    avoidLabelOverlap: false,
                    itemStyle: {
                        borderRadius: 6,
                        borderColor: '#fff',
                        borderWidth: 3
                    },
                    label: {
                        show: true,
                        position: 'outside',
                        formatter: '{b}\n{d}%',
                        fontSize: 10,
                        color: '#6b7280',
                        lineHeight: 15
                    },
                    labelLine: {
                        length: 16,
                        length2: 12,
                        lineStyle: { color: '#d1d5db' }
                    },
                    emphasis: {
                        label: { show: true, fontSize: 13, fontWeight: 'bold', color: '#1f2937' },
                        scaleSize: 10,
                        focus: 'self'
                    },
                    data: names.map((name, i) => ({
                        name: name,
                        value: values[i]
                    }))
                }]
            };
            chartInstance.setOption(option);

            // 点击图例切换时更新中心文字
            chartInstance.on('legendselectchanged', function () {
                const opt = chartInstance.getOption();
                const seriesData = opt.series[0].data;
                let visibleTotal = 0;
                seriesData.forEach(d => {
                    if (!d.selected || d.selected === undefined || d.selected) {
                        visibleTotal += d.value;
                    }
                });
                // 不在ECharts实例中存储状态，直接更新title
            });

            if (chartResizeObserver) chartResizeObserver.disconnect();
            chartResizeObserver = new ResizeObserver(() => { if (chartInstance) chartInstance.resize(); });
            chartResizeObserver.observe(chartDom);
        }

        // ============================================================
        // 收入录入 / 修改提交
        // ============================================================
        formIncome.addEventListener('submit', async (e) => {
            e.preventDefault();
            const amountStr = $('#income-amount').value.trim();
            const source = $('#income-source').value.trim();
            const remark = $('#income-remark').value.trim();
            const editingId = editId.value;

            if (!amountStr) { showToast('请输入金额', '⚠️'); $('#income-amount').focus(); return; }
            const amount = parseFloat(amountStr);
            if (isNaN(amount) || amount <= 0) { showToast('请输入有效的正数金额', '⚠️'); return; }

            const { data: { user } } = await supabase.auth.getUser();
            if (!user) { showToast('请先登录', '⚠️'); return; }

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> 保存中...';

            let error;
            if (editingId) {
                // 修改模式
                const result = await supabase.from('incomes').update({
                    amount: amount, source: source || '未命名收入', remark: remark || null
                }).eq('id', editingId);
                error = result.error;
            } else {
                // 新增模式
                const result = await supabase.from('incomes').insert({
                    user_id: user.id, amount: amount, source: source || '未命名收入', remark: remark || null
                });
                error = result.error;
            }

            btnSubmit.disabled = false;
            if (error) { showToast('保存失败：' + error.message, '❌'); return; }

            showToast(editingId ? '修改成功！' : '记录成功！', '✅');
            cancelEdit();
            await loadAllData();
        });

        // 金额输入增强
        $('#income-amount').addEventListener('input', function () {
            let val = this.value.replace(/[^\d.]/g, '');
            const parts = val.split('.');
            if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
            if (parts.length === 2 && parts[1].length > 2) val = parts[0] + '.' + parts[1].substring(0, 2);
            this.value = val;
        });

        // ============================================================
        // 模糊搜索
        // ============================================================
        $('#search-input').addEventListener('input', function () {
            searchKeyword = this.value;
            const btnClear = $('#btn-clear-search');
            if (searchKeyword.trim()) {
                btnClear.classList.remove('hidden');
            } else {
                btnClear.classList.add('hidden');
            }
            applySearchFilter();
        });

        $('#btn-clear-search').addEventListener('click', function () {
            const input = $('#search-input');
            input.value = '';
            searchKeyword = '';
            this.classList.add('hidden');
            applySearchFilter();
            input.focus();
        });

        // ============================================================
        // 页面滑动切换
        // ============================================================
        const swipeContainer = $('#swipe-container');
        const tabPage1 = $('#tab-page1');
        const tabPage2 = $('#tab-page2');
        const dot1 = $('#dot1');
        const dot2 = $('#dot2');

        function switchToPage(page) {
            if (page === 1) {
                swipeContainer.scrollTo({ left: 0, behavior: 'smooth' });
                tabPage1.className = 'text-sm font-medium min-h-[36px] px-1 transition-colors text-emerald-500 border-b-2 border-emerald-500';
                tabPage2.className = 'text-sm font-medium min-h-[36px] px-1 transition-colors text-gray-300 border-b-2 border-transparent';
                dot1.className = 'w-1.5 h-1.5 rounded-full bg-emerald-500 transition-all';
                dot2.className = 'w-1.5 h-1.5 rounded-full bg-gray-200 transition-all';
            } else {
                swipeContainer.scrollTo({ left: swipeContainer.offsetWidth, behavior: 'smooth' });
                tabPage2.className = 'text-sm font-medium min-h-[36px] px-1 transition-colors text-emerald-500 border-b-2 border-emerald-500';
                tabPage1.className = 'text-sm font-medium min-h-[36px] px-1 transition-colors text-gray-300 border-b-2 border-transparent';
                dot2.className = 'w-1.5 h-1.5 rounded-full bg-emerald-500 transition-all';
                dot1.className = 'w-1.5 h-1.5 rounded-full bg-gray-200 transition-all';
            }
        }

        tabPage1.addEventListener('click', () => switchToPage(1));
        tabPage2.addEventListener('click', () => switchToPage(2));

        // 监听滑动，同步 Tab 状态
        swipeContainer.addEventListener('scroll', () => {
            const scrollLeft = swipeContainer.scrollLeft;
            const pageWidth = swipeContainer.offsetWidth;
            if (scrollLeft < pageWidth / 2) {
                tabPage1.className = 'text-sm font-medium min-h-[36px] px-1 transition-colors text-emerald-500 border-b-2 border-emerald-500';
                tabPage2.className = 'text-sm font-medium min-h-[36px] px-1 transition-colors text-gray-300 border-b-2 border-transparent';
                dot1.className = 'w-1.5 h-1.5 rounded-full bg-emerald-500 transition-all';
                dot2.className = 'w-1.5 h-1.5 rounded-full bg-gray-200 transition-all';
            } else {
                tabPage2.className = 'text-sm font-medium min-h-[36px] px-1 transition-colors text-emerald-500 border-b-2 border-emerald-500';
                tabPage1.className = 'text-sm font-medium min-h-[36px] px-1 transition-colors text-gray-300 border-b-2 border-transparent';
                dot2.className = 'w-1.5 h-1.5 rounded-full bg-emerald-500 transition-all';
                dot1.className = 'w-1.5 h-1.5 rounded-full bg-gray-200 transition-all';
            }
        }, { passive: true });

        // 初始化：确保在第一页
        switchToPage(1);

        // ============================================================
        // 清理
        // ============================================================
        window.addEventListener('beforeunload', () => {
            if (chartInstance) chartInstance.dispose();
            if (chartResizeObserver) chartResizeObserver.disconnect();
        });

        // ============================================================
        // 启动
        // ============================================================
        (async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session?.user) {
                authSection.classList.add('hidden');
                mainSection.classList.remove('hidden');
                headerActions.classList.remove('hidden');
                headerEmail.textContent = session.user.email;
                loadAllData();
            }
        })();

    })();
    </script>

</body>
</html>
